name: Pipeline-CD-Ev3-DevOps

on:
  push:
    branches: [ "main", "develop" ] # Se ejecutará al empujar cambios a cualquiera de estas ramas
  pull_request:
    branches: [ "main" ]

jobs:
  verificacion:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar codigo
      uses: actions/checkout@v4

    - name: Mensaje de exito
      run: |
        echo "¡Hola! de GitHub Actions."
        echo "Se Ha detectado un cambio en la rama."
        echo "Validando el entorno... ¡Todo en Orden!"

  build:
    needs: verificacion # Espera que la verificación pase con éxito
    runs-on: ubuntu-latest
    steps:
    - name: Clonar código
      uses: actions/checkout@v4

    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir y Subir Imagen de Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Respeta exactamente el mismo nombre del deployment.yml
        tags: jorge1331/ev3-devops:latest 

  deploy:
    needs: build # No se ejecuta si la compilación o subida a Docker Hub falla
    runs-on: ubuntu-latest
    steps:
    - name: Clonar código
      uses: actions/checkout@v4

    - name: 🔍 Ejecutar Script de Auditoría de Seguridad
      run: |
        echo "Iniciando auditoría de cumplimiento de código..."
        # Busca si alguien dejó la palabra "PASSWORD" o "SECRET" escrita en texto plano en los archivos
        if grep -rni "password=" . --exclude-dir=.github || grep -rni "aws_secret_access_key" . --exclude-dir=.github; then
          echo "❌ ERROR CRÍTICO DE CUMPLIMIENTO: Se detectaron posibles credenciales expuestas en el código."
          exit 1
        else
          echo "✅ AUDITORÍA EXITOSA: El código cumple con las políticas de seguridad."
        fi

    - name: Configurar acceso a Kubernetes en AWS
      env:
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DATA }}
      run: |
        mkdir -p ~/.kube
        echo "$KUBE_CONFIG" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Desplegar en el clúster de AWS
      run: |
        kubectl apply -f k8s/deployment.yml --insecure-skip-tls-verify=true
        # Verifica que los pods arranquen correctamente
        kubectl rollout status deployment/ev3-devops-deployment --insecure-skip-tls-verify=true
